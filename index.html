<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalRX.io - Clinic Dashboard (Static Clone)</title>
    <!-- Tailwind CSS (via CDN for portability) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (via CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Chart.js (via CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --brand-primary: #3b82f6;
            --brand-secondary: #6366f1;
            --brand-bg: #f8fafc;
        }

        [data-theme="midnight"] {
            --brand-primary: #a855f7;
            --brand-secondary: #ec4899;
            --brand-bg: #0f172a;
        }

        [data-theme="mint"] {
            --brand-primary: #10b981;
            --brand-secondary: #06b6d4;
            --brand-bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--brand-bg);
            transition: background-color 0.3s ease;
        }

        .text-primary { color: var(--brand-primary); }
        .bg-primary { background-color: var(--brand-primary); }
        .border-primary { border-color: var(--brand-primary); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .sidebar-item:hover {
            background-color: #f1f5f9;
            color: var(--brand-primary);
        }

        .sidebar-item.active {
            background-color: var(--brand-primary);
            color: white;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide-in {
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
    <script>
        // Theme management
        const savedTheme = localStorage.getItem('clinic_theme') || 'ocean';
        document.documentElement.setAttribute('data-theme', savedTheme);

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('clinic_theme', theme);
        }
    </script>
</head>

<body class="bg-gray-50 text-gray-800 h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-white border-r border-gray-200 flex flex-col hidden md:flex z-50 shadow-lg">
        <div class="h-16 flex items-center px-6 border-b border-gray-100">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center text-white mr-3 bg-primary">
                <i class="fa-solid fa-user-doctor"></i>
            </div>
            <span class="text-xl font-bold text-gray-700">DigitalRX<span class="text-primary">.io</span></span>
        </div>

        <nav id="nav-menu" class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <!-- Navigation items will be injected here -->
        </nav>

        <div class="p-4 border-t border-gray-100">
            <button onclick="openModal('help-modal')"
                class="w-full flex items-center px-3 py-2.5 rounded-lg text-purple-600 bg-purple-50 hover:bg-purple-100 text-sm font-medium transition-colors">
                <i class="fa-solid fa-circle-info w-6 text-center mr-2"></i>
                Need Help?
            </button>
            <button onclick="logout()"
                class="w-full mt-2 flex items-center px-3 py-2.5 rounded-lg text-red-600 hover:bg-red-50 text-sm font-medium transition-colors">
                <i class="fa-solid fa-right-from-bracket w-6 text-center mr-2"></i>
                Logout (Demo)
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

            <div class="flex items-center">
                <button id="mobile-menu-toggle"
                    class="md:hidden p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 mr-2">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <div>
                    <h1 id="page-title" class="text-xl font-semibold text-gray-800">Dashboard</h1>
                    <p id="page-breadcrumb" class="text-xs text-gray-500 hidden sm:block">DigitalRX.io - Dashboard</p>
                </div>
            </div>

            <div class="flex items-center space-x-4">
                <!-- Notifications -->
                <div class="relative group" id="notification-center">
                    <button onclick="toggleNotifications()"
                        class="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center text-gray-400 hover:bg-white hover:text-primary transition-all relative">
                        <i class="fa-regular fa-bell"></i>
                        <span id="notif-badge"
                            class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-[8px] font-bold rounded-full flex items-center justify-center hidden">0</span>
                    </button>
                    <div id="notif-dropdown"
                        class="absolute right-0 mt-2 w-80 bg-white rounded-2xl shadow-2xl border border-gray-100 hidden z-50 overflow-hidden">
                        <div class="p-4 border-b border-gray-50 flex justify-between items-center">
                            <h4 class="text-sm font-bold text-gray-800">Notifications</h4>
                            <span class="text-[10px] text-blue-600 font-bold uppercase tracking-wider">Live</span>
                        </div>
                        <div id="notif-list" class="max-h-64 overflow-y-auto">
                            <div class="p-8 text-center text-gray-400 text-xs text-gray-500">No new alerts</div>
                        </div>
                    </div>
                </div>

                <!-- Theme Switcher -->
                <div class="flex bg-gray-100 p-1 rounded-xl">
                    <button onclick="setTheme('ocean')" class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-white transition-all text-blue-500" title="Ocean Theme">
                        <i class="fa-solid fa-droplet"></i>
                    </button>
                    <button onclick="setTheme('midnight')" class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-white transition-all text-purple-500" title="Midnight Theme">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <button onclick="setTheme('mint')" class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-white transition-all text-emerald-500" title="Mint Theme">
                        <i class="fa-solid fa-leaf"></i>
                    </button>
                </div>

                <button onclick="openModal('appointment-modal')"
                    class="text-white text-sm font-medium py-2 px-4 rounded-md shadow flex items-center gap-2 transition-all hover:opacity-90 active:scale-95 bg-primary">
                    <i class="fa-regular fa-calendar-plus"></i>
                    <span class="hidden sm:inline">Book Appointment</span>
                </button>
                <div class="flex items-center gap-2 text-sm text-gray-600">
                    <img src="https://flagcdn.com/w20/us.png" alt="US" class="h-4 w-auto">
                    <span class="hidden md:inline">English</span>
                </div>
                <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center text-gray-500">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
        </header>

        <main id="main-content" class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 bg-gray-50">
            <!-- Content will be injected here by JS -->
        </main>
    </div>

    <!-- Modals Container -->
    <div id="modal-container" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-4">
        <!-- Help Modal -->
        <div id="help-modal" class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden hidden p-8">
            <h3 class="text-xl font-bold text-gray-800 mb-4">Need Assistance?</h3>
            <div class="space-y-4">
                <a href="mailto:support@digitalrx.io" class="flex items-center gap-4 p-4 border rounded-xl hover:bg-blue-50 group transition-all">
                    <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-all">
                        <i class="fa-solid fa-envelope text-xl"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-gray-800">Email Support</h4>
                        <p class="text-sm text-gray-500">Response within 24h</p>
                    </div>
                </a>
            </div>
            <button onclick="closeModal()" class="w-full mt-6 py-2 text-gray-400 hover:text-gray-600 underline">Close</button>
        </div>

        <!-- Appointment Modal -->

            </div>
            <form id="appointment-form" class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Patient Name</label>
                        <input type="text" name="patient_name" required class="w-full px-4 py-3 bg-gray-50 border border-transparent rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm" placeholder="Enter full name">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Doctor</label>
                        <select name="doctor_id" required class="w-full px-4 py-3 bg-gray-50 border border-transparent rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm appearance-none cursor-pointer">
                            <option value="1">Dr. Paul Malone</option>
                            <option value="2">Dr. Sarah Johnson</option>
                            <option value="3">Dr. Michael Chen</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Treatment</label>
                        <select name="treatment_id" class="w-full px-4 py-3 bg-gray-50 border border-transparent rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm appearance-none cursor-pointer">
                            <option value="">-- Select Treatment --</option>
                            <option value="1">Cardiac Surgery</option>
                            <option value="2">Dental Cleaning</option>
                            <option value="3">Physical Therapy</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Date & Time</label>
                        <input type="datetime-local" name="appointment_date" required class="w-full px-4 py-3 bg-gray-50 border border-transparent rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm">
                    </div>
                </div>
                <button type="button" onclick="handleBooking()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-blue-700 shadow-xl shadow-blue-100 active:scale-[0.98] transition-all">
                    Finalize Booking
                </button>
            </form>
        </div>

        <!-- Register Patient Modal -->
        <div id="register-patient-modal" class="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden hidden transform transition-all p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-gray-800 tracking-tight">Register Patient</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form id="register-patient-form" class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Full Name</label>
                        <input type="text" name="name" required class="w-full px-4 py-3 bg-gray-50 border border-transparent rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm" placeholder="Enter full name">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Age</label>
                        <input type="number" name="age" required class="w-full px-4 py-3 bg-gray-50 border border-transparent rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Gender</label>
                        <select name="gender" class="w-full px-4 py-3 bg-gray-50 border border-transparent rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm appearance-none cursor-pointer">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Blood Type</label>
                        <input type="text" name="blood" placeholder="e.g. O+" class="w-full px-4 py-3 bg-gray-50 border border-transparent rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm">
                    </div>
                </div>
                <button type="button" onclick="handleRegisterPatient()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-blue-700 shadow-xl shadow-blue-100 active:scale-[0.98] transition-all">
                    Register Patient
                </button>
            </form>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[200] space-y-3"></div>

        // --- SPA ENGINE ---
        let currentView = 'dashboard';

        function renderNav() {
            const nav = document.getElementById('nav-menu');
            nav.innerHTML = MOCK_DATA.navItems.map(item => `
                <a href="javascript:void(0)" onclick="switchView('${item.id}')"
                    class="sidebar-item ${currentView === item.id ? 'active' : 'text-gray-600'} flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors group">
                    <i class="fa-solid ${item.icon} w-6 text-center mr-2"></i>
                    ${item.label}
                </a>
            `).join('');
        }

        function switchView(viewId) {
            currentView = viewId;
            renderNav();
            const title = MOCK_DATA.navItems.find(i => i.id === viewId)?.label || 'Dashboard';
            const breadcrumb = document.getElementById('page-breadcrumb');
            if (breadcrumb) {
                document.getElementById('page-title').innerText = title;
                breadcrumb.innerText = `DigitalRX.io - ${title}`;
            }
            
            const main = document.getElementById('main-content');
            main.innerHTML = `<div class="fade-in">${VIEWS[viewId] ? VIEWS[viewId]() : `<div class="p-12 text-center text-gray-400">View ${viewId} is coming soon!</div>`}</div>`;
            
            if (viewId === 'dashboard') initDashboardChart();
        }

        // --- VIEWS ---
        const VIEWS = {
            dashboard: () => `

                                    </div>

        // --- CHART JS ---
        function initDashboardChart() {
            setTimeout(() => {
                const canvas = document.getElementById('appointmentsChart');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let gradient = ctx.createLinearGradient(0, 0, 0, 200);
                gradient.addColorStop(0, 'rgba(59, 130, 246, 0.5)');
                gradient.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                        datasets: [{
                            label: 'Appointments',
                            data: [12, 19, 15, 25, 22, 10, 8],
                            borderColor: '#3b82f6',
                            backgroundColor: gradient,
                            borderWidth: 2,
                            pointBackgroundColor: '#ffffff',
                            pointBorderColor: '#3b82f6',
                            pointRadius: 4,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true, grid: { borderDash: [2, 4], color: '#f1f5f9' }, ticks: { font: { size: 10 }, color: '#94a3b8' } },
                            x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#94a3b8' } }
                        }
                    }
                });
            }, 100);
        }

        // --- UTILS ---
        function toggleNotifications() {
            document.getElementById('notif-dropdown').classList.toggle('hidden');
        }

        function openModal(id) {
            document.getElementById('modal-container').classList.remove('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-container').classList.add('hidden');
            document.querySelectorAll('#modal-container > div').forEach(m => m.classList.add('hidden'));
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = `bg-emerald-600 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-slide-in`;
            toast.innerHTML = `<i class="fa-solid fa-check-circle"></i> <span class="text-sm font-bold">${message}</span>`;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function logout() {
            alert('Logout is a demo feature in this static clone.');
        }

        function handleBooking() {
            const form = document.getElementById('appointment-form');
            const formData = new FormData(form);
            const patientName = formData.get('patient_name');
            const doctorId = formData.get('doctor_id');
            const treatmentId = formData.get('treatment_id');
            const appointmentDate = formData.get('appointment_date');

            if (!patientName || !doctorId || !appointmentDate) {
                alert('Please fill in all required fields.');
                return;
            }

            const doctor = MOCK_DATA.doctors.find(d => d.id == doctorId);
            const treatment = MOCK_DATA.treatments[parseInt(treatmentId) - 1] || { name: 'General Consultation' };
            const dateObj = new Date(appointmentDate);
            const formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const formattedTime = dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

            const newAppointment = {
                id: MOCK_DATA.appointments.length + 1,
                patient: patientName,
                doctor: doctor ? doctor.name : 'Unknown',
                date: formattedDate,
                time: formattedTime,
                service: treatment.name,
                status: 'confirmed'
            };

            // Add to mock data
            MOCK_DATA.appointments.unshift(newAppointment);
            
            // Add to recent activities
            MOCK_DATA.recentActivities.unshift({
                type: 'appointment',
                title: 'New appointment booked',
                meta: `${patientName} • Just now`,
                icon: 'fa-check',
                bg: 'bg-green-100',
                text: 'text-green-600'
            });

            // Update stats
            const apptStat = MOCK_DATA.stats.find(s => s.label === 'Appointments');
            if (apptStat) apptStat.value++;

            // Clean up
            closeModal();
            form.reset();
            showToast(`Appointment Booked for ${patientName}`);
            
            // Refresh view
            switchView(currentView);
        }

        function handleRegisterPatient() {
            const form = document.getElementById('register-patient-form');
            const formData = new FormData(form);
            const name = formData.get('name');
            const age = formData.get('age');
            const gender = formData.get('gender');
            const blood = formData.get('blood');

            if (!name || !age) {
                alert('Please fill in name and age.');
                return;
            }

            const initials = name.split(' ').map(n => n[0]).join('').toUpperCase();
            const newPatient = {
                id: MOCK_DATA.patients.length + 1,
                name: name,
                age: parseInt(age),
                gender: gender,
                blood: blood || 'N/A',
                status: 'Active',
                initials: initials
            };

            // Add to mock data
            MOCK_DATA.patients.unshift(newPatient);

            // Add to recent activities
            MOCK_DATA.recentActivities.unshift({
                type: 'patient',
                title: 'New patient registered',
                meta: `${name} • Just now`,
                icon: 'fa-user-plus',
                bg: 'bg-blue-100',
                text: 'text-blue-600'
            });

            // Update stats
            const patientStat = MOCK_DATA.stats.find(s => s.label === 'Patients');
            if (patientStat) patientStat.value++;

            // Clean up
            closeModal();
            form.reset();
            showToast(`Patient ${name} Registered`);

            // Refresh view
            switchView(currentView);
        }

        // Mobile menu toggle logic
        document.getElementById('mobile-menu-toggle')?.addEventListener('click', () => {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
            sidebar.classList.toggle('fixed');
            sidebar.classList.toggle('inset-0');
            sidebar.classList.toggle('w-full');
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            switchView('dashboard');
        });
    </script>
</body>
</html>
